services:
  collector:
    image: ghcr.io/transmitt0r/adsb-collector:latest
    restart: unless-stopped
    environment:
      ADSB_URL: ${ADSB_URL:-http://localhost/tar1090/data/aircraft.json}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-300}
      DATABASE_URL: ${DATABASE_URL}
    network_mode: host
