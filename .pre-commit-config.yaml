repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: ruff format
        types: [python]

      - id: ruff-check
        name: ruff check
        language: system
        entry: ruff check --fix
        types: [python]

      - id: pytest-squawk
        name: pytest (squawk)
        language: system
        entry: bash -c 'uv run pytest -q; c=$?; [ $c -eq 5 ] && exit 0 || exit $c'
        pass_filenames: false
        files: ^(squawk|libs)/
