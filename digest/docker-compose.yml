services:
  bot-db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: digest
      POSTGRES_PASSWORD: ${BOT_DB_PASSWORD}
      POSTGRES_DB: digest
    volumes:
      - bot_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest"]
      interval: 5s
      timeout: 5s
      retries: 10

  digest:
    image: ghcr.io/transmitt0r/adsb-digest:latest
    restart: unless-stopped
    depends_on:
      bot-db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql://digest:${BOT_DB_PASSWORD}@bot-db:5432/digest
      COLLECTOR_DATABASE_URL: ${COLLECTOR_DATABASE_URL}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-}
      DIGEST_SCHEDULE: ${DIGEST_SCHEDULE:-0 8 * * 0}

volumes:
  bot_db_data:
